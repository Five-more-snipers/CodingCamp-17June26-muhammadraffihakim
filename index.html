<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    try {
      var t = JSON.parse(localStorage.getItem('tld_theme'));
      document.documentElement.dataset.theme = (t === 'dark' || t === 'light') ? t
        : (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    } catch(e) {
      document.documentElement.dataset.theme =
        matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="greeting-widget">
    <div class="header-left">
      <div id="time-display">00:00:00</div>
      <div id="date-display">Loading…</div>
    </div>
    <div class="header-center">
      <div id="greeting-display">Good Morning</div>
      <div class="name-row">
        <input id="name-input" type="text" maxlength="50" placeholder="Your name…" autocomplete="off">
        <button id="btn-save-name">Save</button>
        <span id="name-error" class="err" aria-live="polite"></span>
      </div>
    </div>
    <button id="btn-theme-toggle" aria-label="Toggle theme" title="Toggle theme">🌙</button>
  </header>

  <main class="grid">

    <section class="card" id="timer-section">
      <h2 class="card-title">⏱ Focus Timer</h2>
      <div id="timer-display" class="clock">25:00</div>
      <div id="timer-completion" class="banner hidden">🎉 Session complete! Take a break.</div>
      <div class="btn-row">
        <button id="btn-start" class="btn-accent">▶ Start</button>
        <button id="btn-stop" disabled>⏸ Stop</button>
        <button id="btn-reset">↺ Reset</button>
      </div>
      <div class="duration-row">
        <label for="duration-input">Duration (min)</label>
        <input id="duration-input" type="number" min="1" max="120" value="25">
        <button id="btn-save-duration" class="btn-accent">Set</button>
        <span id="duration-error" class="err" aria-live="polite"></span>
      </div>
    </section>

    <section class="card" id="todo-section">
      <h2 class="card-title">✅ To-Do List</h2>
      <div class="input-row">
        <input id="task-input" type="text" maxlength="200" placeholder="Add a task…" autocomplete="off">
        <button id="btn-add-task" class="btn-accent">Add</button>
      </div>
      <span id="task-error" class="err" aria-live="polite"></span>
      <ul id="task-list"></ul>
    </section>

    <section class="card" id="links-section">
      <h2 class="card-title">🔗 Quick Links</h2>
      <div class="links-form">
        <input id="link-name-input" type="text" maxlength="100" placeholder="Name…" autocomplete="off">
        <input id="link-url-input" type="url" maxlength="2048" placeholder="https://…" autocomplete="off">
        <button id="btn-add-link" class="btn-accent">Add</button>
      </div>
      <div class="links-errors">
        <span id="link-name-error" class="err" aria-live="polite"></span>
        <span id="link-url-error" class="err" aria-live="polite"></span>
      </div>
      <div id="links-list"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
